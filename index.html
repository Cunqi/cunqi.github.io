<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Cunqi · 交易工作台</title>
<style>
:root{--bg:#0b0e14;--card:#151a23;--line:#283142;--txt:#e6e9ef;--dim:#8b95a7;--green:#1ec773;--accent:#4c8dff}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(1100px 560px at 50% -8%,#16203a 0%,var(--bg) 55%);color:var(--txt);
font:14px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;
display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 18px}
.hero{text-align:center;margin-bottom:30px}
.hero h1{font-size:30px;margin:0 0 8px;letter-spacing:.5px}
.hero p{color:var(--dim);margin:0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;width:100%;max-width:820px}
.entry{display:block;text-decoration:none;color:var(--txt);background:var(--card);border:1px solid var(--line);
border-radius:16px;padding:22px 22px 18px;transition:transform .1s,border-color .1s,box-shadow .1s}
.entry:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 12px 34px rgba(0,0,0,.35)}
.entry .ico{font-size:30px}
.entry .et{font-size:17px;font-weight:700;margin:8px 0 4px}
.entry .ed{color:var(--dim);font-size:13px}
.entry .eu{color:var(--green);font-size:12px;margin-top:10px;font-variant-numeric:tabular-nums}
.soon{opacity:.5;pointer-events:none}.soon .eu{color:var(--dim)}
footer{margin-top:34px;color:var(--dim);font-size:12px;text-align:center}
</style></head><body>
<div class="hero"><h1>📈 Cunqi · 交易工作台</h1><p>个人交易分析门户</p></div>
<div class="grid">
  <a class="entry" href="sector/">
    <div class="ico">📊</div>
    <div class="et">板块趋势看板</div>
    <div class="ed">每日盘后 · 板块热力图 + 个股技术明细（EMA/RSI/ADX/MACD…）· 保留历史报告</div>
    <div class="eu">最近更新 2026-06-27</div>
  </a>
  <div class="entry soon">
    <div class="ico">🗂️</div>
    <div class="et">更多看板</div>
    <div class="ed">持仓分析 / 异动扫描 等（待接入）</div>
    <div class="eu">敬请期待</div>
  </div>
</div>
<footer>更新于 2026-06-27 22:53:12 PDT · 仅供分析，非交易建议 · noindex</footer>
</body></html>
